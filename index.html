<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lil Bucks — Strategic Intelligence Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800;9..144,900&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --ink:#2A2A2A; --ink-soft:#5A5145; --cream:#FFFDF5; --paper:#FAF5E6; --border:#E5DDC8;
  --pink:#F2B5C0; --pink-deep:#E89BAA; --yellow:#F4B73E; --green:#7FA86F; --brown:#9E652E; --coral:#E8907D;
  --shadow:0 2px 10px rgba(42,42,42,0.06); --shadow-lg:0 10px 40px rgba(42,42,42,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--cream);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
.serif{font-family:'Fraunces',Georgia,serif;letter-spacing:-0.01em}
button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
a{color:inherit;text-decoration:none}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}

/* Sidebar */
.sb{background:#FFFCF0;border-right:1px solid var(--border);padding:22px 14px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh}
.sb-brand{display:flex;align-items:center;gap:10px;padding:4px 8px 18px;border-bottom:1px solid var(--border);margin-bottom:14px}
.sb-logo{width:36px;height:36px;border-radius:50%;background:var(--pink);display:flex;align-items:center;justify-content:center;font-family:'Fraunces';font-weight:900;font-size:9px;color:#fff;letter-spacing:0.04em;line-height:1;text-align:center}
.sb-brand-name{font-family:'Fraunces';font-weight:800;font-size:18px;letter-spacing:-0.02em}
.sb-brand-sub{font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-soft);margin-top:1px}
.sb-section-label{font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:var(--ink-soft);padding:14px 10px 6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-weight:500;font-size:13.5px;color:var(--ink);position:relative;text-align:left;width:100%}
.sb-item:hover{background:rgba(242,181,192,0.18)}
.sb-item.active{background:var(--pink);color:#fff;font-weight:600}
.sb-item-icon{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center}
.sb-item-soon{font-size:9px;letter-spacing:0.08em;text-transform:uppercase;background:#F2EBD3;color:var(--ink-soft);padding:2px 6px;border-radius:3px;margin-left:auto}
.sb-item.active .sb-item-soon{background:rgba(255,255,255,0.22);color:#fff}
.sb-footer{margin-top:auto;padding:14px 10px 4px;border-top:1px solid var(--border);font-size:11px;color:var(--ink-soft);line-height:1.5}
.sb-footer strong{color:var(--ink);font-weight:600;display:block;margin-bottom:2px}
.sb-howit{margin-top:10px;width:100%;text-align:left;font-size:11.5px;color:var(--ink);background:#F8F0D9;padding:9px 12px;border-radius:8px;font-weight:500;letter-spacing:0.01em}
.sb-howit:hover{background:#F0E5C0}

/* Main */
.main{padding:34px 44px 80px;max-width:1400px}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;padding-bottom:18px;border-bottom:1px solid var(--border);margin-bottom:28px}
.page-head h1{font-family:'Fraunces';font-weight:800;font-size:34px;letter-spacing:-0.025em;line-height:1.05}
.page-head .eyebrow{font-size:10.5px;text-transform:uppercase;letter-spacing:0.18em;color:var(--ink-soft);margin-bottom:6px}
.page-head .meta{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.date-pill{background:var(--pink);color:#fff;font-weight:600;padding:5px 11px;border-radius:99px;font-size:11px;letter-spacing:0.04em;text-transform:uppercase}
.refresh-pill{font-size:11px;color:var(--ink-soft);display:flex;align-items:center;gap:6px}
.refresh-dot{width:6px;height:6px;border-radius:50%;background:#7AB05D}

/* Sub tabs */
.subtabs{display:flex;gap:4px;margin:0 0 24px;border-bottom:1px solid var(--border);padding-bottom:0}
.subtab{padding:10px 16px 13px;font-weight:600;font-size:13px;color:var(--ink-soft);border-bottom:2.5px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:8px}
.subtab:hover{color:var(--ink)}
.subtab.active{color:var(--ink);border-bottom-color:var(--ink)}
.subtab-count{background:#F2EBD3;color:var(--ink-soft);padding:1px 7px;border-radius:9px;font-size:10.5px;font-weight:600;letter-spacing:0.02em}
.subtab.active .subtab-count{background:var(--pink);color:#fff}

/* Editorial lede */
.lede{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;background:#FFFCF0;border:1px solid var(--border);border-radius:14px;padding:0;margin-bottom:24px;overflow:hidden}
.lede-col{padding:18px 22px;border-right:1px solid var(--border)}
.lede-col:last-child{border-right:0}
.lede-label{font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:var(--ink-soft);margin-bottom:6px;font-weight:600}
.lede-text{font-family:'Fraunces';font-size:15.5px;line-height:1.4;font-weight:500;color:var(--ink);letter-spacing:-0.005em}

/* Cards grid */
.grid{display:grid;gap:18px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:repeat(3,1fr)}
@media(max-width:1100px){.grid-3{grid-template-columns:1fr 1fr}}

/* Generic card */
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;transition:transform 0.12s,box-shadow 0.12s}
.card:hover{box-shadow:var(--shadow)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.card-type{font-size:10px;text-transform:uppercase;letter-spacing:0.14em;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--paper);color:var(--ink)}
.card-velocity{font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-soft);display:flex;align-items:center;gap:5px}
.velocity-dot{width:6px;height:6px;border-radius:50%}
.velocity-high{background:#D34A4A}
.velocity-medium{background:#E0A53C}
.card-hook{font-family:'Fraunces';font-size:18.5px;line-height:1.25;font-weight:600;letter-spacing:-0.015em;margin-bottom:10px;color:var(--ink)}
.card-detail{font-size:13px;line-height:1.55;color:var(--ink-soft);margin-bottom:12px}
.card-play{background:#FFFAE8;border-left:3px solid var(--yellow);padding:11px 13px;border-radius:0 6px 6px 0;font-size:13px;line-height:1.5;margin-bottom:12px;color:var(--ink)}
.card-play-label{font-size:10px;text-transform:uppercase;letter-spacing:0.14em;font-weight:700;color:var(--brown);display:block;margin-bottom:3px}
.card-meta-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
.card-meta-chip{font-size:11px;background:var(--paper);padding:3px 9px;border-radius:99px;color:var(--ink-soft);font-weight:500}
.card-dna-chip{font-size:10.5px;background:var(--pink);color:#fff;padding:3px 9px;border-radius:4px;font-weight:600;letter-spacing:0.02em;text-transform:uppercase}
.card-sources{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding-top:10px;border-top:1px solid #F2EBD3}
.source-chip{font-family:'JetBrains Mono','Courier New',monospace;font-size:10.5px;background:#F8F0D9;color:var(--brown);padding:2.5px 7px;border-radius:3px;letter-spacing:0;font-weight:500}
.source-chip:hover{background:var(--brown);color:#fff}
.card-actions{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid #F2EBD3}
.drop-btn{background:var(--ink);color:#fff;font-size:10.5px;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;padding:6px 11px;border-radius:5px;display:flex;align-items:center;gap:6px}
.drop-btn:hover{background:var(--pink-deep)}
.drove-chip{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.1em;font-weight:600;display:flex;align-items:center;gap:5px}
.drove-chip strong{color:var(--pink-deep);font-weight:800}

/* Trend card extras */
.trend-pillars{display:flex;gap:4px;flex-wrap:wrap}
.pillar-pip{font-size:9.5px;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;padding:2px 7px;border-radius:3px;color:#fff}
.pip-fuel{background:var(--yellow)}
.pip-bowl{background:var(--green)}
.pip-soil{background:var(--brown)}
.pip-crunch{background:var(--coral)}

/* Pulse type colors */
.type-meme{background:#F4DAE2;color:#A85575}
.type-recipe{background:#E6F0DC;color:#5D7E47}
.type-misinfo{background:#FBE0CE;color:#A05E2D}
.type-news{background:#E8E6F0;color:#5E5A8A}
.type-cultural{background:#FDE8C4;color:#A07526}
.type-entertainment{background:#F5DCEF;color:#854577}

/* Competitor extras */
.comp-direction{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em}
.dir-up{color:#A85959}
.dir-down{color:#5D8054}
.dir-flat{color:var(--ink-soft)}

/* Ambassador */
.amb-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;gap:14px;align-items:center}
.amb-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--yellow));display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Fraunces';font-weight:800;font-size:16px;flex-shrink:0}
.amb-handle{font-weight:700;font-size:14px}
.amb-handle-sub{font-size:11.5px;color:var(--ink-soft);margin-top:1px}
.amb-stats{font-size:11px;color:var(--ink-soft);margin-top:5px;display:flex;gap:9px}
.amb-status{margin-left:auto;font-size:10px;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;padding:3px 8px;border-radius:4px}
.status-active{background:#E0F0D0;color:#5D7E47}
.status-watch{background:#F4ECD0;color:#8A752B}
.status-cold{background:#F0E5DA;color:#8A6E4D}

/* Brief grid */
.pillar-section{margin-bottom:36px}
.pillar-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.pillar-swatch{width:14px;height:14px;border-radius:3px}
.pillar-name{font-family:'Fraunces';font-weight:700;font-size:21px;letter-spacing:-0.015em}
.pillar-meta{margin-left:auto;font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.1em;font-weight:600}

.brief-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:transform 0.12s,box-shadow 0.12s;position:relative}
.brief-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.brief-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;align-items:center}
.brief-priority{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;font-weight:800;padding:3px 8px;border-radius:4px}
.priority-big{background:#FFE7AB;color:#8A5D0E}
.priority-high{background:#FBDAD2;color:#A85F4F}
.priority-standard{background:#F2EBD3;color:var(--ink-soft)}
.brief-platform{font-size:10.5px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.06em}
.brief-flavor{font-size:10.5px;font-weight:600;background:var(--paper);color:var(--brown);padding:2.5px 8px;border-radius:99px}
.brief-concept{font-family:'Fraunces';font-size:17px;line-height:1.3;font-weight:500;letter-spacing:-0.005em;color:var(--ink);margin:8px 0 11px}
.brief-bottom{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--ink-soft);padding-top:10px;border-top:1px solid #F2EBD3}
.brief-time{font-weight:600;text-transform:uppercase;letter-spacing:0.06em}
.brief-id{font-family:'JetBrains Mono','Courier New',monospace;font-size:10.5px;color:#A8987A}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(42,30,15,0.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:40px 16px;z-index:100}
.modal{background:var(--cream);border-radius:16px;max-width:880px;width:100%;max-height:90vh;overflow-y:auto;border:1px solid var(--border);box-shadow:var(--shadow-lg)}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;padding:24px 30px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--cream);z-index:2}
.modal-head h2{font-family:'Fraunces';font-weight:700;font-size:24px;letter-spacing:-0.02em;line-height:1.2;max-width:80%}
.modal-close{font-size:24px;color:var(--ink-soft);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0}
.modal-close:hover{background:var(--paper);color:var(--ink)}
.modal-body{padding:24px 30px 30px}
.modal-section{margin-bottom:24px}
.modal-section-label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.16em;color:var(--ink-soft);font-weight:700;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.modal-section-label::before{content:"";display:block;width:14px;height:1.5px;background:var(--ink-soft)}
.modal-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.modal-row{padding:10px 0;border-bottom:1px solid #F2EBD3;font-size:13.5px;line-height:1.5}
.modal-row:last-child{border-bottom:0}
.modal-row-label{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-soft);font-weight:600;margin-bottom:3px}

.caption-box{background:#FFFCF0;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;font-size:13.5px;line-height:1.55;white-space:pre-line}
.caption-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.caption-label-text{font-family:'Fraunces';font-weight:700;font-size:14px;letter-spacing:-0.01em}
.caption-label-sub{font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--ink-soft);font-weight:600}
.caption-copy-btn{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;color:var(--ink-soft);padding:3px 8px;border-radius:4px}
.caption-copy-btn:hover{background:var(--ink);color:#fff}

.scene-row{display:grid;grid-template-columns:80px 60px 1fr;gap:14px;padding:11px 0;border-bottom:1px solid #F2EBD3;font-size:13px;line-height:1.5}
.scene-num{font-family:'JetBrains Mono','Courier New',monospace;font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.06em}
.scene-time{font-family:'JetBrains Mono','Courier New',monospace;font-size:11px;color:var(--brown);font-weight:600}

.intel-row{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid #F2EBD3;font-size:13px;align-items:flex-start}
.intel-row:last-child{border-bottom:0}
.intel-tag{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;padding:3px 8px;border-radius:3px;flex-shrink:0;min-width:78px;text-align:center}
.tag-trend{background:#F4ECD0;color:#8A752B}
.tag-pulse{background:#F4DAE2;color:#A85575}
.tag-audience{background:#E0F0D0;color:#5D7E47}
.tag-competitor{background:#F0E5DA;color:#8A6E4D}

.hook-row{padding:9px 14px;background:#FFFCF0;border:1px solid var(--border);border-radius:8px;margin-bottom:7px;font-size:13.5px;line-height:1.45;display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
.hook-rec{border-color:var(--pink);background:#FCEEF1}
.hook-tag{font-size:9.5px;text-transform:uppercase;letter-spacing:0.14em;font-weight:800;color:var(--pink-deep);flex-shrink:0;padding-top:1px}

.driven-by{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.driven-chip{font-family:'JetBrains Mono','Courier New',monospace;font-size:10.5px;background:#F8F0D9;color:var(--brown);padding:2.5px 7px;border-radius:3px;font-weight:500}

/* Welcome popup */
.welcome-bg{position:fixed;inset:0;background:rgba(42,30,15,0.55);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;padding:32px 16px;z-index:200}
.welcome{background:var(--cream);border-radius:18px;max-width:920px;width:100%;max-height:92vh;overflow:hidden;display:grid;grid-template-columns:300px 1fr;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
.welcome-left{background:linear-gradient(165deg,var(--pink) 0%,var(--yellow) 100%);padding:32px 28px;display:flex;flex-direction:column;color:#fff;position:relative}
.welcome-left::after{content:"✨";position:absolute;top:18px;right:22px;font-size:20px}
.welcome-issue{font-size:11px;text-transform:uppercase;letter-spacing:0.18em;font-weight:700;margin-bottom:10px;opacity:0.9}
.welcome-date{font-family:'Fraunces';font-weight:800;font-size:30px;line-height:1.05;letter-spacing:-0.025em;margin-bottom:18px}
.welcome-thesis{font-family:'Fraunces';font-size:15.5px;line-height:1.35;font-weight:500;font-style:italic;margin-bottom:auto}
.welcome-emily{font-size:11px;letter-spacing:0.04em;margin-top:22px;border-top:1px solid rgba(255,255,255,0.4);padding-top:14px;opacity:0.92;line-height:1.5}
.welcome-right{padding:30px 32px;overflow-y:auto;max-height:92vh;display:flex;flex-direction:column;gap:18px}
.welcome-close{position:absolute;top:14px;right:18px;font-size:22px;color:#fff;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,0.18);z-index:2}
.welcome-close:hover{background:rgba(255,255,255,0.32)}
.welcome-section h3{font-family:'Fraunces';font-weight:700;font-size:18px;letter-spacing:-0.015em;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.welcome-section h3::before{content:"";width:18px;height:1.5px;background:var(--ink)}
.welcome-thesis-body{font-size:13px;line-height:1.55;color:var(--ink-soft)}
.welcome-thesis-body strong{color:var(--ink);font-weight:600}
.evidence-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:4px}
.evidence-cell{background:#fff;border:1px solid var(--border);border-radius:10px;padding:11px 13px}
.evidence-stat{font-family:'Fraunces';font-weight:800;font-size:22px;line-height:1.1;letter-spacing:-0.02em;margin-bottom:3px}
.evidence-label{font-size:11px;font-weight:600;color:var(--ink);margin-bottom:3px}
.evidence-detail{font-size:11px;color:var(--ink-soft);line-height:1.4;margin-bottom:5px}
.evidence-src{font-family:'JetBrains Mono','Courier New',monospace;font-size:9.5px;color:var(--brown);background:#F8F0D9;padding:1.5px 5px;border-radius:3px}
.welcome-cta{background:var(--ink);color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:0.14em;font-weight:700;padding:13px 18px;border-radius:8px;text-align:center;margin-top:6px;width:100%}
.welcome-cta:hover{background:var(--pink-deep)}
.moves-list{display:flex;flex-direction:column;gap:9px}
.move-item{background:#FFFCF0;border:1px solid var(--border);border-radius:8px;padding:11px 14px}
.move-verb{font-family:'Fraunces';font-weight:700;font-size:13.5px;letter-spacing:-0.005em;margin-bottom:3px;line-height:1.3}
.move-why{font-size:11.5px;color:var(--ink-soft);line-height:1.5}

/* Studio modal */
.studio-modal .modal-body{padding:30px 32px 36px;display:flex;flex-direction:column;align-items:center;text-align:center}
.studio-icon{width:60px;height:60px;border-radius:50%;background:var(--pink);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Fraunces';font-weight:800;font-size:26px;margin-bottom:18px}
.studio-modal h2{font-family:'Fraunces';font-weight:800;font-size:26px;letter-spacing:-0.025em;margin-bottom:8px}
.studio-modal p{font-size:14px;color:var(--ink-soft);line-height:1.6;max-width:560px;margin-bottom:14px}
.studio-modal .feature-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:18px 0 22px;width:100%}
.feature-tile{background:#FFFCF0;border:1px solid var(--border);border-radius:10px;padding:14px 14px 16px}
.feature-tile-head{font-family:'Fraunces';font-weight:700;font-size:14px;letter-spacing:-0.005em;margin-bottom:6px;text-align:left}
.feature-tile-body{font-size:11.5px;color:var(--ink-soft);line-height:1.45;text-align:left}

/* How it works */
.how-section{margin-bottom:22px}
.how-section h3{font-family:'Fraunces';font-weight:700;font-size:17px;margin-bottom:6px;letter-spacing:-0.01em}
.how-section p{font-size:13px;color:var(--ink-soft);line-height:1.6}
.how-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:11px;margin-top:14px}
.how-tile{background:#FFFCF0;border:1px solid var(--border);border-radius:10px;padding:12px 13px}
.how-tile-num{font-family:'JetBrains Mono','Courier New',monospace;font-size:10.5px;color:var(--brown);font-weight:600;margin-bottom:5px}
.how-tile-name{font-family:'Fraunces';font-weight:700;font-size:13.5px;margin-bottom:4px}
.how-tile-body{font-size:11px;color:var(--ink-soft);line-height:1.5}

/* Teaser tab content */
.teaser{background:#FFFCF0;border:1px dashed var(--border);border-radius:16px;padding:60px 40px;text-align:center;margin-top:20px}
.teaser-icon{font-size:36px;margin-bottom:14px}
.teaser h2{font-family:'Fraunces';font-weight:800;font-size:30px;letter-spacing:-0.025em;margin-bottom:8px}
.teaser p{font-size:14px;color:var(--ink-soft);max-width:560px;margin:0 auto 18px;line-height:1.6}
.teaser-features{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:760px;margin:18px auto 0}

/* Ticker */
.ticker{background:var(--ink);color:var(--cream);padding:9px 0;font-size:12px;font-weight:500;overflow:hidden;position:relative;border-radius:8px;margin-bottom:24px}
.ticker-track{display:flex;gap:46px;animation:scroll 60s linear infinite;white-space:nowrap}
.ticker-item{display:inline-flex;align-items:center;gap:8px}
.ticker-dot{width:6px;height:6px;border-radius:50%;background:var(--pink)}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
</style>

function SourceChip({s}){
  return (<a href={s.url} target="_blank" rel="noopener" className="source-chip" title={s.label}>{s.domain}</a>);
}
function Sources({list}){
  if(!list||!list.length) return null;
  return (<div className="card-sources">{list.map((s,i)=><SourceChip key={i} s={s}/>)}</div>);
}

// Drove-N-Briefs counter (computed)
function drovenBy(signalId, signalType){
  let n=0; Object.entries(BRIEF_LINKS).forEach(([_, l])=>{
    if(signalType==="trend" && l.trends.includes(signalId)) n++;
    if(signalType==="pulse" && l.pulse.includes(signalId)) n++;
    if(signalType==="comp" && l.comps.includes(signalId)) n++;
  });
  return n;
}

  return (<>
    <div className="lede">
      <div className="lede-col"><div className="lede-label">The week</div><div className="lede-text serif">{BRIEFS.length} briefs · {BRIEFS.filter(b=>b.priority==="BIG SWING").length} big swings · all 4 pillars hit · 7 hero formats covered</div></div>
      <div className="lede-col"><div className="lede-label">The shape</div><div className="lede-text serif">{BRIEFS.filter(b=>b.platform.includes("IG")).length} IG · {BRIEFS.filter(b=>b.platform==="TikTok").length} TikTok · {BRIEFS.filter(b=>b.platform==="Pinterest").length} Pinterest · {BRIEFS.filter(b=>b.script).length} scripted video</div></div>
      <div className="lede-col"><div className="lede-label">The ride-now beats</div><div className="lede-text serif">{BRIEFS.filter(b=>b.rideNow).length} briefs tagged ride-now — culturally decay-sensitive, ship before week's end.</div></div>
    </div>
    {byPillar.map(g=>(<section key={g.pillar} className="pillar-section">
      <div className="pillar-header">
        <span className="pillar-swatch" style={{background:PILLAR_COLOR[g.pillar]}}></span>
        <span className="pillar-name serif">{g.pillar}</span>
        <span className="pillar-meta">{g.briefs.length} brief{g.briefs.length!==1?"s":""} · {g.briefs.filter(b=>b.priority==="BIG SWING").length} big swing{g.briefs.filter(b=>b.priority==="BIG SWING").length!==1?"s":""}</span>
      </div>
      <div className="grid grid-3">
        {g.briefs.sort((a,b)=>({BIG:0,HIGH:1,STANDARD:2}[a.priority.split(" ")[0]]||9)-({BIG:0,HIGH:1,STANDARD:2}[b.priority.split(" ")[0]]||9)).map(b=>(
          <div key={b.id} className="brief-card" onClick={()=>onOpen(b)}>
            <div className="brief-tags">
              <span className={"brief-priority priority-"+(b.priority==="BIG SWING"?"big":b.priority==="HIGH"?"high":"standard")}>{b.priority}</span>
              <span className="brief-platform">{b.platform}</span>
              <span className="brief-flavor">{b.flavor}</span>
            </div>
            <div className="brief-concept serif">{b.concept}</div>
            <div className="brief-bottom">
              <span className="brief-time">{b.timing}</span>
              <span className="brief-id">{b.id}</span>
            </div>
          </div>
        ))}
      </div>
    </section>))}
  </>);
}

function BriefDetailModal({brief,onClose,onDrop}){
  const variants = CAPTION_VARIANTS[brief.id]||{};
  const links = BRIEF_LINKS[brief.id]||{trends:[],pulse:[],comps:[]};
  return (<div className="modal-bg" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-head">
        <div>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
            <span className={"brief-priority priority-"+(brief.priority==="BIG SWING"?"big":brief.priority==="HIGH"?"high":"standard")}>{brief.priority}</span>
            <span className="brief-platform" style={{fontSize:11}}>{brief.platform}</span>
            <span className="brief-flavor">{brief.flavor}</span>
            <span className="card-dna-chip" style={{fontSize:10}}>{TOP_PERFORMER_DNA.find(d=>d.id===brief.dna)?.name||brief.dna}</span>
            <span className="brief-id">{brief.id}</span>
          </div>
          <h2 className="serif">{brief.concept}</h2>
        </div>
        <button className="modal-close" onClick={onClose}>×</button>
      </div>
      <div className="modal-body">

        <div className="modal-section">
          <div className="modal-section-label">Intel that drove this</div>
          {links.trends.map(id=>{const t=TRENDS.find(x=>x.id===id); if(!t) return null; return <div key={id} className="intel-row"><span className="intel-tag tag-trend">Trend</span><span><strong>{t.trend}</strong> <span style={{color:"var(--ink-soft)"}}>({id})</span></span></div>;})}
          {links.pulse.map(id=>{const t=CULTURAL_PULSE.find(x=>x.id===id); if(!t) return null; return <div key={id} className="intel-row"><span className="intel-tag tag-pulse">Pulse</span><span><strong>{t.hook}</strong> <span style={{color:"var(--ink-soft)"}}>({id})</span></span></div>;})}
          {links.comps.map(id=>{const t=COMPETITORS.find(x=>x.id===id); if(!t) return null; return <div key={id} className="intel-row"><span className="intel-tag tag-competitor">Comp</span><span><strong>{t.name}</strong> · {t.status.slice(0,90)}…</span></div>;})}
          {(!links.trends.length && !links.pulse.length && !links.comps.length) && <div className="intel-row"><span className="intel-tag tag-audience">Internal</span><span>Founder-led brief — no external trigger required.</span></div>}
        </div>

        <div className="modal-section">
          <div className="modal-section-label">Alt hooks (3 options)</div>
          {brief.hooks.map((h,i)=>(<div key={i} className={"hook-row"+(h.recommended?" hook-rec":"")}>
            <span>"{h.text}"</span>
            {h.recommended && <span className="hook-tag">RECOMMENDED</span>}
          </div>))}
        </div>

        <div className="modal-section">
          <div className="modal-section-label">Captions · 3 variants</div>
          {["direct","warm","punchy"].map(k=>variants[k]?(<div key={k}>
            <div className="caption-label">
              <span className="caption-label-text serif">{k==="direct"?"Direct — the receipts":k==="warm"?"Warm — with a wink":"Punchy — mic drop"}</span>
              <button className="caption-copy-btn" onClick={()=>navigator.clipboard&&navigator.clipboard.writeText(variants[k])}>Copy</button>
            </div>
            <div className="caption-box">{variants[k]}</div>
          </div>):null)}
        </div>

        {brief.script && <div className="modal-section">
          <div className="modal-section-label">Shot list · {brief.duration}</div>
          {brief.script.map((s,i)=>(<div key={i} className="scene-row"><span className="scene-num">Scene {s.scene}</span><span className="scene-time">{s.time}</span><span>{s.action}</span></div>))}
        </div>}

        <div className="modal-grid-2">
          <div className="modal-section">
            <div className="modal-section-label">Visual direction</div>
            <div style={{fontSize:13.5,lineHeight:1.6}}>{brief.visual}</div>
          </div>
          <div className="modal-section">
            <div className="modal-section-label">Audio + music</div>
            <div style={{fontSize:13.5,lineHeight:1.6}}>{brief.audio||<span style={{color:"var(--ink-soft)"}}>Static format — no audio</span>}</div>
            {brief.benefitShorthand && <div style={{marginTop:14}}><div className="modal-row-label">End-card stinger</div><div style={{fontSize:13.5,fontStyle:"italic",color:"var(--ink)"}}>{brief.benefitShorthand}</div></div>}
            {brief.muse && <div style={{marginTop:14}}><div className="modal-row-label">Muse posture (backend)</div><div style={{fontSize:13.5}}>{brief.muse}</div></div>}
            {brief.timing && <div style={{marginTop:14}}><div className="modal-row-label">Posting window</div><div style={{fontSize:13.5,fontWeight:600}}>{brief.timing}</div></div>}
          </div>
        </div>

        <div style={{marginTop:18,paddingTop:18,borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11.5,color:"var(--ink-soft)"}}>Want to riff this brief? Send it to the Studio.</span>
          <button className="drop-btn" onClick={onDrop}>↓ Send to Studio</button>
        </div>
      </div>
    </div>
  </div>);
}

function StudioModal({onClose}){
  return (<div className="modal-bg" onClick={onClose}>
    <div className="modal studio-modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-head" style={{justifyContent:"flex-end"}}>
        <button className="modal-close" onClick={onClose}>×</button>
      </div>
      <div className="modal-body">
        <div className="studio-icon">✷</div>
        <h2 className="serif">The Studio</h2>
        <p>The Studio is a riff partner trained on Lil Bucks's voice, muse roster, and every brief shipped through the engine. It edits drafts, tries alt hooks, riffs new angles on a cultural pulse, or pressure-tests a brief against the Voice Compass — all without breaking your operator focus.</p>
        <p style={{color:"var(--pink-deep)",fontWeight:600,fontSize:13}}>Wires up at the start of OPERATE. Demo on the diagnostic call.</p>
        <div className="feature-row">
          <div className="feature-tile">
            <div className="feature-tile-head serif">Riff a brief</div>
            <div className="feature-tile-body">"Sharpen the hook on MAY18-IG-R1 — make it land harder against the protein wave."</div>
          </div>
          <div className="feature-tile">
            <div className="feature-tile-head serif">Test a moment</div>
            <div className="feature-tile-body">"If a creator misinformation about buckwheat goes viral tomorrow, what's our 2-hour response?"</div>
          </div>
          <div className="feature-tile">
            <div className="feature-tile-head serif">Pull intel forward</div>
            <div className="feature-tile-body">"Surface every brief touching SOIL this week + queue Q3 candidates against Kiss the Ground's 1,000-farm milestone."</div>
          </div>
        </div>
        <p style={{fontSize:12,color:"var(--ink-soft)"}}>Built on Anthropic's Claude API with the full Lil Bucks operating model in context. Reasoning visible. Drafts editable. Receipts on tap.</p>
      </div>
    </div>
  </div>);
}

function HowItWorksModal({onClose}){
  const [liveAgents, setLiveAgents] = useState(null);
  const [liveLoading, setLiveLoading] = useState(true);
  useEffect(()=>{
    fetch('/api/agents?client=lilbucks')
      .then(r=>r.json())
      .then(d=>{ if(d.agents?.length) setLiveAgents(d.agents); setLiveLoading(false); })
      .catch(()=>setLiveLoading(false));
  },[]);
  const liveByAgent = new Map((liveAgents||[]).map(a=>[a.agent_id, a]));
  const fmtRun = iso => iso ? new Date(iso).toISOString().slice(0,16).replace('T',' ')+' UTC' : null;
  return (<div className="modal-bg" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-head"><h2 className="serif">How the engine works</h2><button className="modal-close" onClick={onClose}>×</button></div>
      <div className="modal-body">
        <div className="how-section">
          <h3 className="serif">The four-loop product</h3>
          <p>OBSOLETE installs marketing infrastructure SMBs actually own. The engine is the loop — Train → Orchestrate → Run → Learn. Every week it gets sharper because the training data deepens with Emily's feedback.</p>
          <div className="how-grid">
            <div className="how-tile"><div className="how-tile-num">01</div><div className="how-tile-name serif">Train</div><div className="how-tile-body">The 30-day ENCODE captures Emily's voice, the muse roster, guardrails, and source materials. Done once at install, lightly continuous after.</div></div>
            <div className="how-tile"><div className="how-tile-num">02</div><div className="how-tile-name serif">Orchestrate</div><div className="how-tile-body">The engine routes work across the right tools (Claude · GPT · video gen · search · scrape) without Emily needing to know which tool runs which job.</div></div>
            <div className="how-tile"><div className="how-tile-num">03</div><div className="how-tile-name serif">Run</div><div className="how-tile-body">Every Sunday night: pulse, trends, competitors, briefs. Monday morning: open the dashboard and ship.</div></div>
            <div className="how-tile"><div className="how-tile-num">04</div><div className="how-tile-name serif">Learn</div><div className="how-tile-body">Emily's edits + voice notes + performance data feed back. Next week's output is sharper.</div></div>
          </div>
        </div>
        <div className="how-section">
          <h3 className="serif">What's on this dashboard right now</h3>
          <p>This is the V0.1 Impact Slice — one populated week (May 18–24, 2026) showing the Welcome Issue, Intelligence Brief (Cultural Pulse + Category + Competitor + Ambassadors), and Content Briefs. Studio + Weekly Playbook + Performance wire up at the start of OPERATE.</p>
        </div>
        <div className="how-section">
          <h3 className="serif" style={{display:'flex',alignItems:'center',gap:10}}>
            Six agents, one operating model
            {liveAgents && <span style={{fontSize:10,letterSpacing:'0.14em',background:'#7AB05D',color:'#fff',padding:'3px 8px',borderRadius:4,fontWeight:700,textTransform:'uppercase'}}>● Live</span>}
          </h3>
          {AGENTS.map(a=>{
            const live = liveByAgent.get(a.id);
            const ingested = live?.ingested_24h;
            const lastRunLive = fmtRun(live?.last_run_at);
            const sourcesCount = live?.sources_count;
            const sourceTypes = live?.source_types;
            return (<div key={a.id} style={{display:"flex",gap:14,alignItems:"flex-start",padding:"9px 0",borderBottom:"1px solid #F2EBD3"}}>
              <span style={{fontSize:22}}>{a.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14}} className="serif">{a.name}</div>
                <div style={{fontSize:12.5,color:"var(--ink-soft)",lineHeight:1.5}}>{a.focus}</div>
                {live && sourceTypes && sourceTypes.length > 0 && (
                  <div style={{fontSize:10.5,color:'var(--brown)',marginTop:4,fontFamily:"'JetBrains Mono',monospace"}}>
                    {sourcesCount} sources · {sourceTypes.join(' · ')}
                  </div>
                )}
              </div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10.5,color:"var(--brown)",textAlign:"right",minWidth:140}}>
                {live ? (<>
                  <div style={{fontWeight:700,color:'#7AB05D'}}>{ingested ?? 0} signals · 24h</div>
                  <div style={{marginTop:2}}>{lastRunLive || 'no runs yet'}</div>
                </>) : (<>
                  <div>{a.signals != null ? `${a.signals} signals` : 'on demand'}</div>
                  <div style={{marginTop:2}}>Last run<br/>{a.lastRun}</div>
                </>)}
              </div>
            </div>);
          })}
          {!liveAgents && !liveLoading && (
            <div style={{fontSize:11,color:'var(--ink-soft)',marginTop:8,fontStyle:'italic'}}>
              · Live counts pending — workers waiting on Supabase env vars in Vercel. Static counts shown.
            </div>
          )}
        </div>
        <div className="how-section">
          <h3 className="serif">Decisions the engine made this week</h3>
          {DECISIONS.map(d=>(<div key={d.id} style={{padding:"10px 0",borderBottom:"1px solid #F2EBD3"}}><div style={{fontWeight:700,fontSize:13.5,marginBottom:3}}>{d.action}</div><div style={{fontSize:12.5,color:"var(--ink-soft)",lineHeight:1.5}}>{d.reason}</div></div>))}
        </div>
      </div>
    </div>
  </div>);
}

function Teaser({title,icon,body,features}){
  return (<div className="teaser">
    <div className="teaser-icon">{icon}</div>
    <h2 className="serif">{title}</h2>
    <p>{body}</p>
    <p style={{color:"var(--pink-deep)",fontWeight:600}}>Wires up at the start of OPERATE.</p>
    <div className="teaser-features">{features.map((f,i)=>(<div key={i} className="feature-tile"><div className="feature-tile-head serif">{f}</div></div>))}</div>
  </div>);
}

ROOT.render(<App/>);
</script>
</body>
</html>
